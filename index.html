<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Sono", sans-serif;
      }

      .pricing-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 2rem;
      }

      .pricing-plan {
        flex: 1;
        max-width: 400px;
        padding: 20px;
        border: 25px solid #E3E3E3;
        border-radius: 10%;
        box-sizing: border-box;
        background-color: #E3E3E3;
      }

      .creative {
        text-transform: uppercase;
      }

      .month {
        font-style: italic;
      }

      .plan-title, .plan-price {
        font-size: 2.5rem;
        text-align: center;
      }

      .plan-features {
        list-style: none;
      }

      .plan-button {
        display: inline-block;
        border-radius: 20%;
        border: none;
        background-color: #B4DEBD;
        margin-left: 39%;
      }

      
      @media (max-width: 1250px) {
        
        .pricing-container {
         flex-direction: column;
         height: 100%;
      }

        .pricing-plan {
        flex: none;
        width: 100%;
        max-width: 400px;
      }
    }

    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title"><span class="creative">Basic</span></div>
        <div class="plan-price">$9.99/<span class="month">month*</span></div>
        <hr />
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title"><span class="creative">Standard</span></div>
        <div class="plan-price">$19.99/<span class="month">month*</span></div>
        <hr />
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title"><span class="creative">Premium</span></div>
        <div class="plan-price">$49.99/<span class="month">month*</span></div>
        <hr />
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
